name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve Flutter version
        id: ver
        run: |
          V="$(
            awk '
              /^environment:/ { in_env = 1; next }
              in_env && /^[^[:space:]]/ { in_env = 0 }
              in_env && /^[[:space:]]*flutter:/ { print; exit }
            ' pubspec.yaml |
            sed -E 's/.*>= *([0-9]+\.[0-9]+\.[0-9]+).*/\1/'
          )"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Using Flutter $V"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.ver.outputs.version }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Publish
        uses: k-paxian/dart-package-publisher@master
        with:
          credentialJson: ${{ secrets.CREDENTIAL_JSON }}
          flutter: true
          skipTests: true
